name: colombo

services:
  colombo:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        CODEX_VERSION: ${CODEX_VERSION:-0.136.0}
    image: colombo:local
    restart: unless-stopped
    init: true
    read_only: true
    env_file:
      - path: /etc/colombo.env
        required: false
    environment:
      NODE_ENV: production
      HOME: /home/node
      CODEX_HOME: /home/node/.codex
      XDG_CACHE_HOME: /var/lib/colombo/.cache
      XDG_DATA_HOME: /var/lib/colombo/.local/share
      TMPDIR: /tmp
      codex_bin: codex
      codex_workdir: /opt/colombo
      colombo_dir: /opt/colombo
      agent_instructions_file: AGENTS.md
      state_dir: /var/lib/colombo
    volumes:
      # Colombo/Codex reads the checked-out repo as investigation context; it should not write here at runtime.
      - type: bind
        source: .
        target: /opt/colombo
        read_only: true
      # Minimal runtime Codex config with only Colombo-approved MCP servers and read-only credentials.
      - type: bind
        source: /etc/colombo/codex
        target: /home/node/.codex
        read_only: true
      # Job state, final summaries, feedback records, and Codex cache/data live here.
      - type: bind
        source: /var/lib/colombo
        target: /var/lib/colombo
    tmpfs:
      # Temporary files only; removed when the container stops.
      - /tmp:rw,nosuid,nodev
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
